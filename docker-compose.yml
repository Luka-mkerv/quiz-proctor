services:
  postgres:
    image: postgres:16-alpine
    container_name: quiz-proctor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: quizadmin
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: quiz_proctor
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizadmin -d quiz_proctor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-proctor-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - mssql_backups:/app/uploads/db
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: quiz-proctor-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserverdata:/var/opt/mssql
      - mssql_backups:/var/opt/mssql/backup
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  sqlserverdata:
  mssql_backups: