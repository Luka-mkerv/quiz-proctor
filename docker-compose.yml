services:
  postgres:
    image: postgres:16-alpine
    container_name: quiz-proctor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: quizadmin
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: quiz_proctor
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizadmin -d quiz_proctor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-proctor-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

volumes:
  pgdata: